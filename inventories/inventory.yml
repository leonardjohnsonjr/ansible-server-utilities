---
all:
  children:
    linux:
      vars:
        ansible_user: lenny
        ansible_ssh_private_key_file: ~/.ssh/lenny
        ansible_become: true
      children:
        debian:
          hosts:
            optiplex5050:
              ansible_host: 192.168.1.116
            thinkpad:
              ansible_host: 192.168.1.113
        redhat:
          hosts:
            dell-inspiron:
              ansible_host: 192.168.1.108
    macos:
      vars:
        ansible_user: ansible
        ansible_become: true
      hosts:
        mac01.example.com:
          ansible_host: 192.0.2.20
    windows:
      vars:
          ansible_user: ansible
          ansible_password: "{{ vault_windows_ansible_password }}"
          ansible_connection: winrm
          ansible_winrm_transport: ntlm
          ansible_winrm_scheme: https
          ansible_port: 5986
          ansible_winrm_server_cert_validation: ignore
      hosts:
        office-desktop:
          ansible_host: 10.78.175.85
    domain_controllers:
      vars:
          ansible_user: domain-admin@example.com
          ansible_password: "{{ vault_domain_admin_password }}"
          ansible_connection: winrm
          ansible_winrm_transport: kerberos
          ansible_winrm_server_cert_validation: ignore
      hosts:
        dc01.example.com:
          ansible_host: 192.0.2.40
